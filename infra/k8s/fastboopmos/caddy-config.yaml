apiVersion: v1
kind: ConfigMap
metadata:
  name: fastboopmos-caddy
data:
  Caddyfile: |-
    {
      admin off
      auto_https off
    }

    :80 {
      respond /healthz "ok" 200

      @gha path /gha /gha/*
      handle @gha {
        reverse_proxy fastboopmos-gha-proxy:80
      }

      @edge path /edge.channel /edge.channel.sha256 /__fastboopmos/live
      handle @edge {
        reverse_proxy fastboopmos-release:80
      }

      handle {
        respond "not found" 404
      }
    }
