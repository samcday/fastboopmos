apiVersion: runtime.wasmcloud.dev/v1alpha1
kind: WorkloadDeployment
metadata:
  name: fastboopmos-frontdoor
spec:
  replicas: 2
  template:
    spec:
      hostSelector:
        hostgroup: default
      components:
        - name: frontdoor
          image: ghcr.io/samcday/fastboopmos-frontdoor-edge:latest
          imagePullPolicy: Always
          localResources:
            environment:
              configFrom:
                - name: fastboopmos-frontdoor-config
              secretFrom:
                - name: fastboopmos-release
            allowedHosts:
              - api.github.com
              - github.com
              - objects.githubusercontent.com
              - release-assets.githubusercontent.com
              - "*.actions.githubusercontent.com"
              - "*.blob.core.windows.net"
            volumeMounts:
              - name: cache
                mountPath: /cache
      volumes:
        - name: cache
          ephemeral: {}
      hostInterfaces:
        - namespace: wasi
          package: http
          interfaces:
            - incoming-handler
          config:
            host: fastboopmos.samcday.com
