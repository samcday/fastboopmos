apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastboopmos
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: fastboopmos
  template:
    metadata:
      labels:
        app: fastboopmos
      annotations:
        fastboopmos.samcday.com/caddy-config-rev: "20260319-1"
    spec:
      containers:
        - name: caddy
          image: docker.io/caddy:2.10.2
          command:
            - /usr/bin/caddy
          args:
            - run
            - --config
            - /etc/caddy/Caddyfile
            - --adapter
            - caddyfile
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
      volumes:
        - name: config
          configMap:
            name: fastboopmos-caddy
