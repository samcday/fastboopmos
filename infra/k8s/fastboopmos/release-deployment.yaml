apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastboopmos-release
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fastboopmos-release
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fastboopmos-release
    spec:
      containers:
        - name: release
          image: python:3.12.12-slim
          command:
            - python
            - /app/channel_release_app.py
          envFrom:
            - configMapRef:
                name: fastboopmos-release-config
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fastboopmos-release
                  key: token
                  optional: true
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 2
              memory: 2Gi
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
            - name: cache
              mountPath: /cache
      volumes:
        - name: app
          configMap:
            name: fastboopmos-release-script
            defaultMode: 0555
        - name: cache
          emptyDir: {}
