id: samsung-a5u-eur
display_name: Samsung Galaxy A5
devicetree_name: qcom/msm8916-samsung-a5u-eur

match:
  - fastboot:
      vid: 0x18d1
      pid: 0xd00d

probe:
  - fastboot.getvar: product
    equals: lk2nd-msm8916
  - fastboot.getvar: lk2nd:compatible
    equals: samsung,a5u-eur

boot:
  fastboot_boot:
    android_bootimg:
      header_version: 0
      page_size: 2048
      base: 0x80000000

      limits:
        max_kernel_bytes: 0
        max_initrd_bytes: 0 
        max_total_bytes: 0

      kernel:
        encoding: image.gz+dtb
    cmdline_append: "console=ttyMSM0,115200n8"

