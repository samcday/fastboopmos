name: Nightly BootProfile Sync

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FASTBOOP_VERSION: 0.0.1-rc.9
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Download fastboop CLI release
        run: |
          python - <<'PY'
          import io
          import os
          import stat
          import tarfile
          import urllib.request
          from pathlib import Path

          version = os.environ["FASTBOOP_VERSION"]
          url = (
              "https://github.com/samcday/fastboop/releases/download/"
              f"v{version}/fastboop-cli-x86_64-unknown-linux-musl.tar.gz"
          )

          data = urllib.request.urlopen(url).read()
          out_dir = Path("bin")
          out_dir.mkdir(parents=True, exist_ok=True)

          with tarfile.open(fileobj=io.BytesIO(data), mode="r:gz") as archive:
              member = next(
                  (
                      m
                      for m in archive.getmembers()
                      if m.isfile() and Path(m.name).name == "fastboop"
                  ),
                  None,
              )
              if member is None:
                  raise RuntimeError("fastboop binary not found in release archive")

              extracted = archive.extractfile(member)
              if extracted is None:
                  raise RuntimeError("failed to extract fastboop binary")

              output = out_dir / "fastboop"
              output.write_bytes(extracted.read())
              output.chmod(output.stat().st_mode | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)
          PY

      - name: Generate canonical bootprofile YAMLs
        run: |
          python scripts/sync_bootprofiles.py \
            --compile-bootpro \
            --fastboop ./bin/fastboop

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Open one PR per changed device
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/open_device_prs.py
