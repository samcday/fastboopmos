name: Nightly BootProfile Sync

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      device:
        description: "Optional device id from devices.yaml (for targeted sync)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FASTBOOP_VERSION: 0.0.1-rc.9
      MIRROR_BUCKET: ${{ secrets.FASTBOOPMOS_MIRROR_BUCKET }}
      MIRROR_ENDPOINT_URL: ${{ vars.FASTBOOPMOS_MIRROR_ENDPOINT_URL }}
      MIRROR_REGION: ${{ vars.FASTBOOPMOS_MIRROR_REGION }}
      MIRROR_PREFIX: ${{ vars.FASTBOOPMOS_MIRROR_PREFIX }}
      MIRROR_PUBLIC_BASE_URL: ${{ vars.FASTBOOPMOS_MIRROR_PUBLIC_BASE_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.FASTBOOPMOS_MIRROR_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.FASTBOOPMOS_MIRROR_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Download fastboop CLI release
        run: |
          python - <<'PY'
          import io
          import os
          import stat
          import tarfile
          import urllib.request
          from pathlib import Path

          version = os.environ["FASTBOOP_VERSION"]
          url = (
              "https://github.com/samcday/fastboop/releases/download/"
              f"v{version}/fastboop-cli-x86_64-unknown-linux-musl.tar.gz"
          )

          data = urllib.request.urlopen(url).read()
          out_dir = Path("bin")
          out_dir.mkdir(parents=True, exist_ok=True)

          with tarfile.open(fileobj=io.BytesIO(data), mode="r:gz") as archive:
              member = next(
                  (
                      m
                      for m in archive.getmembers()
                      if m.isfile() and Path(m.name).name == "fastboop"
                  ),
                  None,
              )
              if member is None:
                  raise RuntimeError("fastboop binary not found in release archive")

              extracted = archive.extractfile(member)
              if extracted is None:
                  raise RuntimeError("failed to extract fastboop binary")

              output = out_dir / "fastboop"
              output.write_bytes(extracted.read())
              output.chmod(output.stat().st_mode | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)
          PY

      - name: Generate canonical bootprofile YAMLs
        run: |
          DEVICE_INPUT="${{ github.event.inputs.device || '' }}"
          : "${MIRROR_BUCKET:?missing FASTBOOPMOS_MIRROR_BUCKET secret}"
          : "${MIRROR_ENDPOINT_URL:?missing FASTBOOPMOS_MIRROR_ENDPOINT_URL variable}"
          : "${MIRROR_PUBLIC_BASE_URL:?missing FASTBOOPMOS_MIRROR_PUBLIC_BASE_URL variable}"
          : "${AWS_ACCESS_KEY_ID:?missing FASTBOOPMOS_MIRROR_ACCESS_KEY_ID secret}"
          : "${AWS_SECRET_ACCESS_KEY:?missing FASTBOOPMOS_MIRROR_SECRET_ACCESS_KEY secret}"

          args=(
            scripts/sync_bootprofiles.py
            --compile-bootpro
            --fastboop ./bin/fastboop
            --mirror-bucket "$MIRROR_BUCKET"
            --mirror-endpoint-url "$MIRROR_ENDPOINT_URL"
            --mirror-public-base-url "$MIRROR_PUBLIC_BASE_URL"
          )
          if [ -n "$MIRROR_REGION" ]; then
            args+=(--mirror-region "$MIRROR_REGION")
          fi
          if [ -n "$MIRROR_PREFIX" ]; then
            args+=(--mirror-prefix "$MIRROR_PREFIX")
          fi
          if [ -n "$DEVICE_INPUT" ]; then
            args+=(--only-device "$DEVICE_INPUT")
          fi
          python "${args[@]}"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Open one PR per changed device
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/open_device_prs.py
