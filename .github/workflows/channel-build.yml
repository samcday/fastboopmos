name: Build Channel

on:
  push:
    branches: [main]
    paths-ignore:
      - infra/k8s/fastboopmos/latest.txt
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      device:
        description: "Optional postmarketOS device id (e.g. oneplus-fajita)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FASTBOOP_VERSION: 0.0.1-rc.15
      CACHE_BUCKET: ${{ secrets.FASTBOOPMOS_CACHE_BUCKET }}
      CACHE_ENDPOINT_URL: ${{ vars.FASTBOOPMOS_CACHE_ENDPOINT_URL }}
      CACHE_PREFIX: ${{ vars.FASTBOOPMOS_CACHE_PREFIX || 'fastboopmos' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.FASTBOOPMOS_CACHE_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.FASTBOOPMOS_CACHE_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install jinja2

      - name: Download fastboop CLI release
        run: |
          python - <<'PY'
          import io
          import os
          import stat
          import tarfile
          import urllib.request
          from pathlib import Path

          version = os.environ["FASTBOOP_VERSION"]
          url = (
              "https://github.com/samcday/fastboop/releases/download/"
              f"v{version}/fastboop-cli-x86_64-unknown-linux-musl.tar.gz"
          )

          data = urllib.request.urlopen(url).read()
          out_dir = Path("bin")
          out_dir.mkdir(parents=True, exist_ok=True)

          with tarfile.open(fileobj=io.BytesIO(data), mode="r:gz") as archive:
              member = next(
                  (
                      m
                      for m in archive.getmembers()
                      if m.isfile() and Path(m.name).name == "fastboop"
                  ),
                  None,
              )
              if member is None:
                  raise RuntimeError("fastboop binary not found in release archive")

              extracted = archive.extractfile(member)
              if extracted is None:
                  raise RuntimeError("failed to extract fastboop binary")

              output = out_dir / "fastboop"
              output.write_bytes(extracted.read())
              output.chmod(output.stat().st_mode | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)
          PY

      - name: Build channel from index + templates + cache
        run: |
          DEVICE_INPUT="${{ github.event.inputs.device || '' }}"
          : "${CACHE_BUCKET:?missing FASTBOOPMOS_CACHE_BUCKET secret}"
          : "${CACHE_ENDPOINT_URL:?missing FASTBOOPMOS_CACHE_ENDPOINT_URL variable}"
          : "${AWS_ACCESS_KEY_ID:?missing FASTBOOPMOS_CACHE_ACCESS_KEY_ID secret}"
          : "${AWS_SECRET_ACCESS_KEY:?missing FASTBOOPMOS_CACHE_SECRET_ACCESS_KEY secret}"

          args=(
            scripts/build_channel.py
            --fastboop ./bin/fastboop
            --cache-bucket "$CACHE_BUCKET"
            --cache-endpoint-url "$CACHE_ENDPOINT_URL"
            --cache-prefix "$CACHE_PREFIX"
            --output dist/edge.channel
          )
          if [ -n "$DEVICE_INPUT" ]; then
            args+=(--only-device "$DEVICE_INPUT")
          fi
          python "${args[@]}"

      - name: Write channel metadata
        run: |
          mkdir -p dist
          sha256sum dist/edge.channel | awk '{print $1}' > dist/edge.channel.sha256

      - name: Upload workflow artifact
        id: upload_channel
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: edge-channel
          if-no-files-found: error
          path: |
            dist/edge.channel
            dist/edge.channel.sha256

      - name: Update live artifact pointer
        if: github.event_name == 'push' || github.event_name == 'schedule'
        run: |
          set -euo pipefail
          artifact_id="${{ steps.upload_channel.outputs.artifact-id }}"
          if [ -z "$artifact_id" ]; then
            echo "missing upload artifact-id output" >&2
            exit 1
          fi

          printf '%s\n' "$artifact_id" > infra/k8s/fastboopmos/latest.txt
          if git diff --quiet -- infra/k8s/fastboopmos/latest.txt; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/fastboopmos/latest.txt
          git commit -m "infra: advance edge channel artifact pointer"
          git push
