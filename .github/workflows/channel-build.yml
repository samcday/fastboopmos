name: Build Channel

on:
  push:
    branches: [main]
    paths-ignore:
      - infra/k8s/fastboopmos/latest.txt
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      device:
        description: "Optional postmarketOS device id (e.g. oneplus-fajita)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust toolchain + cache
        uses: actions-rust-lang/setup-rust-toolchain@1fbea72663f6d4c03efaab13560c8a24cfd2a7cc # v1.9.0
        with:
          components: clippy, rustfmt
          rustflags: ""

      - name: Rustfmt
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked --no-deps -- -D warnings

      - name: Build fastboopmos
        run: cargo build --release --locked -p fastboopmos

      - name: Compute matrix
        id: list
        env:
          DEVICE_INPUT: ${{ github.event.inputs.device }}
        run: |
          set -euo pipefail
          raw="$(./target/release/fastboopmos list)"
          if [ -n "${DEVICE_INPUT:-}" ]; then
            raw="$(printf '%s' "$raw" | jq --arg d "$DEVICE_INPUT" '[.[] | select(.device==$d)]')"
          fi
          count="$(printf '%s' "$raw" | jq 'length')"
          if [ "$count" -eq 0 ]; then
            echo "::error::matrix is empty (no (device,ui) pairs to build)"
            exit 1
          fi
          echo "matrix=$(printf '%s' "$raw" | jq -c .)" >> "$GITHUB_OUTPUT"

      - name: Upload fastboopmos binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: fastboopmos-bin
          path: target/release/fastboopmos
          if-no-files-found: error

  bootpro:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    env:
      CACHE_BUCKET: ${{ secrets.FASTBOOPMOS_CACHE_BUCKET }}
      CACHE_ENDPOINT_URL: ${{ vars.FASTBOOPMOS_CACHE_ENDPOINT_URL }}
      CACHE_PREFIX: ${{ vars.FASTBOOPMOS_CACHE_PREFIX || 'fastboopmos' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.FASTBOOPMOS_CACHE_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.FASTBOOPMOS_CACHE_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download fastboopmos binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: fastboopmos-bin
          path: bin

      - name: Make binary executable
        run: chmod +x bin/fastboopmos

      - name: Build bootpro
        env:
          DEVICE: ${{ matrix.device }}
          UI: ${{ matrix.ui }}
        run: |
          set -euo pipefail
          : "${CACHE_BUCKET:?missing FASTBOOPMOS_CACHE_BUCKET secret}"
          : "${CACHE_ENDPOINT_URL:?missing FASTBOOPMOS_CACHE_ENDPOINT_URL variable}"

          ./bin/fastboopmos build \
            --device "$DEVICE" \
            --ui "$UI" \
            --cache-url "${CACHE_ENDPOINT_URL%/}/${CACHE_BUCKET}/${CACHE_PREFIX}"

      - name: Push new bootpros to cache
        if: always() && hashFiles('build/pmos-bootpros/*') != ''
        run: |
          set -euo pipefail
          : "${AWS_ACCESS_KEY_ID:?missing FASTBOOPMOS_CACHE_ACCESS_KEY_ID secret}"
          : "${AWS_SECRET_ACCESS_KEY:?missing FASTBOOPMOS_CACHE_SECRET_ACCESS_KEY secret}"

          aws s3 sync --size-only \
            --endpoint-url "$CACHE_ENDPOINT_URL" \
            build/pmos-bootpros/ \
            "s3://$CACHE_BUCKET/$CACHE_PREFIX/edge/bootpro/"

  channel:
    needs: bootpro
    runs-on: ubuntu-latest
    env:
      CACHE_BUCKET: ${{ secrets.FASTBOOPMOS_CACHE_BUCKET }}
      CACHE_ENDPOINT_URL: ${{ vars.FASTBOOPMOS_CACHE_ENDPOINT_URL }}
      CACHE_PREFIX: ${{ vars.FASTBOOPMOS_CACHE_PREFIX || 'fastboopmos' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download fastboopmos binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: fastboopmos-bin
          path: bin

      - name: Make binary executable
        run: chmod +x bin/fastboopmos

      - name: Assemble channel
        env:
          DEVICE_INPUT: ${{ github.event.inputs.device }}
        run: |
          set -euo pipefail
          : "${CACHE_BUCKET:?missing FASTBOOPMOS_CACHE_BUCKET secret}"
          : "${CACHE_ENDPOINT_URL:?missing FASTBOOPMOS_CACHE_ENDPOINT_URL variable}"

          args=(
            channel
            --cache-url "${CACHE_ENDPOINT_URL%/}/${CACHE_BUCKET}/${CACHE_PREFIX}"
            --output dist/edge.channel
          )
          if [ -n "${DEVICE_INPUT:-}" ]; then
            args+=(--device "$DEVICE_INPUT")
          fi
          ./bin/fastboopmos "${args[@]}"

      - name: Write channel metadata
        run: |
          mkdir -p dist
          sha256sum dist/edge.channel | awk '{print $1}' > dist/edge.channel.sha256

      - name: Upload workflow artifact
        id: upload_channel
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: edge-channel
          if-no-files-found: error
          path: |
            dist/edge.channel
            dist/edge.channel.sha256

      - name: Update live artifact pointer
        if: github.event_name == 'push' || github.event_name == 'schedule'
        run: |
          set -euo pipefail
          artifact_id="${{ steps.upload_channel.outputs.artifact-id }}"
          if [ -z "$artifact_id" ]; then
            echo "missing upload artifact-id output" >&2
            exit 1
          fi

          printf '%s\n' "$artifact_id" > infra/k8s/fastboopmos/latest.txt
          if git diff --quiet -- infra/k8s/fastboopmos/latest.txt; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/fastboopmos/latest.txt
          git commit -m "infra: advance edge channel artifact pointer"
          git push
