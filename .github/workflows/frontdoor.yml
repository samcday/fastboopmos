name: Build Frontdoor

on:
  push:
    branches: [main]
    paths:
      - infra/frontdoor/**
      - .github/workflows/frontdoor.yml
  pull_request:
    branches: [main]
    paths:
      - infra/frontdoor/**
      - .github/workflows/frontdoor.yml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-edge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Rust toolchain + cache
        uses: actions-rust-lang/setup-rust-toolchain@1fbea72663f6d4c03efaab13560c8a24cfd2a7cc # v1.9.0
        with:
          toolchain: 1.94.1
          target: wasm32-wasip2

      - name: Clippy
        working-directory: infra/frontdoor
        run: cargo clippy --target wasm32-wasip2 -p frontdoor-edge --locked -- -D warnings

      - name: Build wasm component
        working-directory: infra/frontdoor
        run: cargo build --release --target wasm32-wasip2 -p frontdoor-edge --locked

      - name: Install wash
        if: github.event_name != 'pull_request'
        run: |
          curl -s https://packagecloud.io/install/repositories/wasmcloud/core/script.deb.sh | sudo bash
          sudo apt-get install wash

      - name: Push wasm component to GHCR
        if: github.event_name != 'pull_request'
        env:
          WASH_REG_USER: ${{ github.actor }}
          WASH_REG_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/fastboopmos-frontdoor-edge
          TAG: ${{ github.run_id }}
        working-directory: infra/frontdoor
        run: |
          wash push "${IMAGE}:${TAG}" target/wasm32-wasip2/release/frontdoor_edge.wasm

      - name: Update workload image tag
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/fastboopmos-frontdoor-edge
          TAG: ${{ github.run_id }}
        run: |
          set -euo pipefail
          perl -0pi -e "s#image: ghcr.io/[^[:space:]]+/fastboopmos-frontdoor-edge:[^[:space:]]+#image: ${IMAGE}:${TAG}#" infra/k8s/fastboopmos/workload-deployment.yaml
          if git diff --quiet -- infra/k8s/fastboopmos/workload-deployment.yaml; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/fastboopmos/workload-deployment.yaml
          git commit -m "infra: advance frontdoor edge component"
          git push
