name: Publish Channel

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-channel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fastboopmos
        uses: actions/checkout@v4

      - name: Build compiled channel
        run: |
          python scripts/build_channel.py \
            --bootpros-dir bootprofiles \
            --output dist/edge.channel

      - name: Write channel metadata
        run: |
          mkdir -p dist
          sha256sum dist/edge.channel | awk '{print $1}' > dist/edge.channel.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: edge-channel
          if-no-files-found: error
          path: |
            dist/edge.channel
            dist/edge.channel.sha256

      - name: Generate edge release tag
        if: github.event_name == 'push'
        id: tag
        run: |
          set -euo pipefail
          tag="edge-$(date -u +%Y%m%d%H%M%S)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Publish edge release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: |
            dist/edge.channel
            dist/edge.channel.sha256
